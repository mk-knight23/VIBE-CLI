name: CI - Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  cli:
    name: CLI - Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: cd vibe-cli && npm install
      
      - name: Build
        run: cd vibe-cli && npm run build
      
      - name: Test
        run: cd vibe-cli && npm test --if-present
      
      - name: Check version
        run: cd vibe-cli && node -p "require('./package.json').version"

  web:
    name: Web - Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: cd vibe-web && npm install
      
      - name: Build
        run: cd vibe-web && npm run build
      
      - name: Check version
        run: cd vibe-web && node -p "require('./package.json').version"

  extension:
    name: Extension - Build & Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: cd vibe-code && npm install
      
      - name: Compile
        run: cd vibe-code && npm run compile
      
      - name: Package
        run: cd vibe-code && npx @vscode/vsce package
      
      - name: Check version
        run: cd vibe-code && node -p "require('./package.json').version"
      
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vibe-vscode-vsix
          path: vibe-code/*.vsix
          retention-days: 7
