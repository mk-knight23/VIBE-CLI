name: Release vibe-cli binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

defaults:
  run:
    working-directory: vibe-cli

jobs:
  build-and-release:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build binary bundle
        run: npm run build:bin

      - name: Prepare upload artifacts
        shell: bash
        run: |
          mkdir -p upload
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            cp dist/vibe-linux upload/vibe-linux-x64
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            cp dist/vibe-macos upload/vibe-macos-x64
          else
            cp dist/vibe-win.exe upload/vibe-win-x64.exe
          fi
          ls -l upload

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}